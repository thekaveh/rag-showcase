# Per-model request properties for the RAG plugin, keyed by the LiteLLM model name
# (the same values used in roles.yaml). Each model's properties are merged into every
# chat request the plugin sends to THAT model — and only that model. A model not
# listed here (e.g. a cloud model a role is later flipped to) gets nothing extra.
#
# `think: false` suppresses chain-of-thought on local reasoning models. For the
# qwen3.6 family this is ~30x faster for RAG (no multi-thousand-token "thinking" pass)
# and avoids a huge KV cache; Ollama honors the top-level `think` flag and LiteLLM
# forwards it. Leave a model unlisted to keep its default behavior (e.g. a cloud
# model with its own thinking semantics).
#
# `qwen3.6:latest` is the gen-ai-rag stack's default chat model (what roles.yaml
# points the generation roles at). `qwen3.6-moe` is a historical runtime alias
# used during earlier host-Ollama validation; it is not present in a fresh clone,
# so an unused entry here is harmless.
qwen3.6:latest:
  think: false
qwen3.6-moe:
  think: false
