site_name: RAG Showcase
site_description: >-
  Six RAG strategies — vanilla, hybrid, contextual, graph, agentic, and n8n-adaptive —
  compared side-by-side as OpenAI-compatible endpoints on a fully-local Atlas stack,
  with a reproducible LLM judge-panel evaluation harness.
site_url: https://thekaveh.github.io/rag-showcase/
site_author: Kaveh Razavi
repo_url: https://github.com/thekaveh/rag-showcase
repo_name: thekaveh/rag-showcase
edit_uri: edit/main/docs/
copyright: Copyright &copy; 2026 Kaveh Razavi

# Predictable relative paths for the raw-HTML diagram iframes (page URL == .md path).
use_directory_urls: false

theme:
  name: material
  language: en
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/circle-half-full
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: white
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to system preference
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.action.edit
    - content.tooltips

plugins:
  - search
  - include-markdown

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

hooks:
  - docs_hooks.py

extra_css:
  - stylesheets/extra.css

# Docs cross-link to repo source (../compare/*.py, ../demo/*.yaml, ...); docs_hooks.py
# rewrites those to GitHub, so silence the resulting "absolute/unrecognized" link noise.
validation:
  omitted_files: warn
  absolute_links: ignore
  unrecognized_links: ignore

nav:
  - Home: index.md
  - Get Started:
      - Overview: guide/overview.md
      - Quick Start: guide/quickstart.md
      - Hardware Sizing: hardware.md
  - Approaches:
      - Approach Internals: approaches.md
      - Flavor Tuning: approach-flavor-tuning.md
  - Architecture:
      - System Architecture: architecture.md
      - System Diagram (interactive): diagrams/architecture.md
      - Approach Flow Diagram (interactive): diagrams/approach-flows.md
      - Atlas Reuse Assessment: atlas-reuse-assessment.md
      - Dependency Contract Ledger: dependency-contracts.md
      - LightRAG Role-Model Spec: atlas-lightrag-role-model-spec.md
  - Evaluation & Results:
      - Methodology: evaluation-methodology.md
      - Live Comparison: comparison.md
      - Dataset Complexity Report: dataset-complexity-report.md
      - Result Snapshots: results/README.md
  - Data & Components:
      - Corpus Overview: components/corpus.md
      - Dataset Adapters: components/adapters.md
      - n8n Adaptive Workflow: components/n8n.md
  - Design Notes:
      - Product Design Spec: superpowers/specs/2026-06-25-rag-showcase-design.md
      - LightRAG Alignment Design: superpowers/specs/2026-07-02-atlas-lightrag-alignment-design.md
      - "Plan — RAG Showcase": superpowers/plans/2026-06-25-rag-showcase.md
      - "Plan — Approach Flavors": superpowers/plans/2026-07-02-approach-flavors.md
      - "Plan — LightRAG Alignment": superpowers/plans/2026-07-02-atlas-lightrag-alignment.md
      - "Plan — Cyber-Threat Dataset": superpowers/plans/2026-07-03-cyber-threat-dataset.md
