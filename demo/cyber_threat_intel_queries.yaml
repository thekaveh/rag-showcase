- id: cyber_group_technique_software_chain
  query: "Which intrusion groups connect to the same ATT&CK techniques through shared software, and which CVEs or mitigations are relevant?"
  expect_winner: graph-rag
  rationale: "Requires graph paths across groups, software, techniques, CVEs, and mitigations."
- id: cyber_cve_product_weakness_path
  query: "Trace CVEs from affected products to CWE weaknesses and ATT&CK techniques that could exploit the same weakness pattern."
  expect_winner: graph-rag
  rationale: "Requires multi-hop relationship traversal over CVE, CPE, CWE, and technique nodes."
- id: cyber_campaign_overlap
  query: "Which campaigns overlap by tooling or technique even when attributed to different groups?"
  expect_winner: graph-rag
  rationale: "Requires shared-entity graph reasoning across campaigns, groups, tools, and techniques."
- id: cyber_mitigation_coverage
  query: "Which mitigations cover the broadest set of related techniques and software behaviors in this slice?"
  expect_winner: graph-rag
  rationale: "Requires relationship aggregation over mitigation-to-technique paths."
- id: cyber_timeline_intrusion_set
  query: "Build a timeline linking intrusion groups, newly disclosed vulnerabilities, and observed technique usage."
  expect_winner: graph-rag
  rationale: "Requires temporal graph reasoning plus textual evidence."
- id: cyber_vendor_risk_cluster
  query: "Which vendors or products sit in the densest risk clusters based on CVEs, weaknesses, exploit techniques, and mitigations?"
  expect_winner: graph-rag
  rationale: "Requires graph-density reasoning over products, vulnerabilities, and techniques."
