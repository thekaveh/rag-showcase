<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>hybrid-rag service and data flow</title>
  <style>
    * { box-sizing: border-box; } html, body { width: 1800px; height: 1000px; margin: 0; overflow: hidden; }
    body { background: #020617; color: #f8fafc; font-family: "JetBrains Mono", Menlo, monospace; padding: 22px 30px 14px; }
    header { height: 72px; display: flex; align-items: center; gap: 16px; } .dot { width: 12px; height: 12px; border-radius: 50%; background: #22d3ee; box-shadow: 0 0 18px #22d3ee; }
    h1 { font-size: 28px; margin: 0; letter-spacing: 0; } header p { color: #94a3b8; font-size: 14px; margin: 7px 0 0; }
    main { height: 850px; border: 1px solid #1e293b; border-radius: 8px; background: #07101f; } svg { display: block; width: 100%; height: 100%; }
    footer { height: 38px; color: #64748b; font-size: 12px; display: flex; align-items: center; justify-content: center; }
    .boundary { fill: #0b1220; stroke: #334155; stroke-width: 1.5; stroke-dasharray: 8 6; } .lane { fill: #94a3b8; font-size: 13px; font-weight: 700; }
    .node { stroke-width: 2; rx: 6; } .external { fill: #111827; stroke: #94a3b8; } .backend { fill: #063b32; stroke: #34d399; } .model { fill: #422006; stroke: #fbbf24; } .data { fill: #2e1065; stroke: #a78bfa; }
    .title { fill: #f8fafc; font-size: 13px; font-weight: 700; text-anchor: middle; } .sub { fill: #cbd5e1; font-size: 9px; text-anchor: middle; }
    .flow { fill: none; stroke: #22d3ee; stroke-width: 2.2; marker-end: url(#arrow); } .prep { fill: none; stroke: #a78bfa; stroke-width: 2; marker-end: url(#arrow-purple); }
    .bypass { fill: none; stroke: #fbbf24; stroke-width: 1.7; stroke-dasharray: 6 5; marker-end: url(#arrow-amber); }
    .step { fill: #020617; stroke: #22d3ee; stroke-width: 1.5; } .step-text { fill: #67e8f9; font-size: 10px; font-weight: 700; text-anchor: middle; dominant-baseline: middle; }
    .label { fill: #cbd5e1; font-size: 9px; text-anchor: middle; } .ledger { fill: #0f172a; stroke: #334155; stroke-width: 1.5; }
    .ledger-title { fill: #f8fafc; font-size: 13px; font-weight: 700; } .ledger-head { fill: #67e8f9; font-size: 10px; font-weight: 700; } .ledger-copy { fill: #94a3b8; font-size: 9px; }
  </style>
</head>
<body>
  <header><span class="dot"></span><div><h1>hybrid-rag · service and data flow</h1><p>BM25 + dense relative-score fusion, optional TEI reranking, then bounded generation</p></div></header>
  <main>
    <svg viewBox="0 0 1800 860" role="img" aria-labelledby="title desc">
      <title id="title">hybrid-rag service and data flow</title><desc id="desc">Atlas ingestion into RagBase followed by fused keyword and vector retrieval, optional TEI reranking, and answer generation.</desc>
      <defs>
        <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M40 0H0V40" fill="none" stroke="#1e293b" stroke-width="0.6"/></pattern>
        <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0 0L10 4L0 8Z" fill="#22d3ee"/></marker>
        <marker id="arrow-purple" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0 0L10 4L0 8Z" fill="#a78bfa"/></marker>
        <marker id="arrow-amber" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0 0L10 4L0 8Z" fill="#fbbf24"/></marker>
      </defs>
      <rect width="1800" height="860" fill="url(#grid)"/><rect class="boundary" x="205" y="45" width="1550" height="570" rx="10"/>
      <text class="lane" x="225" y="72">ATLAS COMPOSE STACK · RAG TRACK</text><text class="lane" x="225" y="104" fill="#a78bfa">SHARED CORPUS PREPARATION</text><text class="lane" x="225" y="318" fill="#22d3ee">QUERY PATH</text>

      <path class="prep" d="M475 185H565"/><path class="prep" d="M765 185H855"/><path class="prep" d="M1055 185H1145"/>
      <path class="flow" d="M185 430H225"/><path class="flow" d="M400 430H440"/><path class="flow" d="M615 430H655"/><path class="flow" d="M830 430H870"/><path class="flow" d="M1060 430H1100"/><path class="flow" d="M1290 430H1330"/><path class="flow" d="M1520 430H1560"/>
      <path class="bypass" d="M965 470V535H1425V470"/>

      <g><circle class="step" cx="205" cy="430" r="11"/><text class="step-text" x="205" y="430">1</text><text class="label" x="205" y="408">request</text></g>
      <g><circle class="step" cx="420" cy="430" r="11"/><text class="step-text" x="420" y="430">2</text><text class="label" x="420" y="408">dispatch</text></g>
      <g><circle class="step" cx="635" cy="430" r="11"/><text class="step-text" x="635" y="430">3</text><text class="label" x="635" y="408">embed</text></g>
      <g><circle class="step" cx="850" cy="430" r="11"/><text class="step-text" x="850" y="430">4</text><text class="label" x="850" y="408">vector</text></g>
      <g><circle class="step" cx="1080" cy="430" r="11"/><text class="step-text" x="1080" y="430">5</text><text class="label" x="1080" y="408">20 candidates</text></g>
      <g><circle class="step" cx="1310" cy="430" r="11"/><text class="step-text" x="1310" y="430">6</text><text class="label" x="1310" y="408">top 5</text></g>
      <g><circle class="step" cx="1540" cy="430" r="11"/><text class="step-text" x="1540" y="430">7</text><text class="label" x="1540" y="408">answer</text></g>
      <text class="label" x="1195" y="558" fill="#fbbf24">rerank=false · bypass TEI and preserve fused order</text>

      <rect class="node external" x="275" y="145" width="200" height="80"/><text class="title" x="375" y="176">Corpus documents</text><text class="sub" x="375" y="198">selected dataset/profile</text>
      <rect class="node backend" x="565" y="145" width="200" height="80"/><text class="title" x="665" y="176">Atlas ingestion</text><text class="sub" x="665" y="198">parse · chunk · metadata</text>
      <rect class="node model" x="855" y="145" width="200" height="80"/><text class="title" x="955" y="176">Embedding model</text><text class="sub" x="955" y="198">nomic-embed-text</text>
      <rect class="node data" x="1145" y="145" width="200" height="80"/><text class="title" x="1245" y="176">Weaviate · RagBase</text><text class="sub" x="1245" y="198">text index + vectors</text>

      <rect class="node external" x="20" y="390" width="165" height="80"/><text class="title" x="102" y="420">Caller</text><text class="sub" x="102" y="442">Open WebUI / API</text>
      <rect class="node backend" x="225" y="390" width="175" height="80"/><text class="title" x="312" y="420">LiteLLM</text><text class="sub" x="312" y="442">model: hybrid-rag</text>
      <rect class="node backend" x="440" y="390" width="175" height="80"/><text class="title" x="527" y="420">Hybrid plugin</text><text class="sub" x="527" y="442">fusion · prompt · metrics</text>
      <rect class="node model" x="655" y="390" width="175" height="80"/><text class="title" x="742" y="420">Query embedding</text><text class="sub" x="742" y="442">nomic-embed-text</text>
      <rect class="node data" x="870" y="390" width="190" height="80"/><text class="title" x="965" y="420">Weaviate hybrid</text><text class="sub" x="965" y="442">BM25 + dense · α=0.5</text>
      <rect class="node model" x="1100" y="390" width="190" height="80"/><text class="title" x="1195" y="420">TEI reranker</text><text class="sub" x="1195" y="442">cross-encoder · optional</text>
      <rect class="node model" x="1330" y="390" width="190" height="80"/><text class="title" x="1425" y="420">light_gen</text><text class="sub" x="1425" y="442">question + top context</text>
      <rect class="node external" x="1560" y="390" width="175" height="80"/><text class="title" x="1647" y="420">OpenAI response</text><text class="sub" x="1647" y="442">answer · sources · metrics</text>

      <rect class="ledger" x="45" y="650" width="1710" height="170" rx="8"/><text class="ledger-title" x="70" y="680">MESSAGE CONTRACT AND TUNING SURFACES</text>
      <line x1="470" y1="695" x2="470" y2="800" stroke="#334155"/><line x1="900" y1="695" x2="900" y2="800" stroke="#334155"/><line x1="1330" y1="695" x2="1330" y2="800" stroke="#334155"/>
      <text class="ledger-head" x="70" y="710">0 · INDEX</text><text class="ledger-copy" x="70" y="730">RagBase stores lexical text and dense vectors.</text><text class="ledger-copy" x="70" y="748">The same index supports both retrieval signals.</text><text class="ledger-copy" x="70" y="766">No graph is constructed.</text>
      <text class="ledger-head" x="500" y="710">1–4 · RETRIEVAL REQUEST</text><text class="ledger-copy" x="500" y="730">question + vector → Weaviate hybrid query</text><text class="ledger-copy" x="500" y="748">alpha balances BM25 and dense relevance.</text><text class="ledger-copy" x="500" y="766">retrieve_k controls the candidate pool.</text>
      <text class="ledger-head" x="930" y="710">5–6 · OPTIONAL RERANK</text><text class="ledger-copy" x="930" y="730">query + candidate texts → TEI /rerank</text><text class="ledger-copy" x="930" y="748">top_n bounds the generation context.</text><text class="ledger-copy" x="930" y="766">Disabled mode bypasses TEI explicitly.</text>
      <text class="ledger-head" x="1360" y="710">7 · GENERATE + RETURN</text><text class="ledger-copy" x="1360" y="730">light_gen receives ordered evidence.</text><text class="ledger-copy" x="1360" y="748">Response preserves source identifiers and scores.</text><text class="ledger-copy" x="1360" y="766">Metrics expose retrieval and generation latency.</text>
    </svg>
  </main>
  <footer>Deployment: Atlas Compose project selected by the rag-showcase consumer manifest · Invocation: LiteLLM model alias → backend plugin endpoint</footer>
</body>
</html>
