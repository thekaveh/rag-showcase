flavors:
  - alias: vanilla-rag-wide
    base: vanilla-rag
    flavor: wide
    label: Vanilla Wide
    description: Dense retrieval with a larger stuffed context window.
    requires_reingest: false
    params:
      k: 8

  - alias: hybrid-rag-high-recall
    base: hybrid-rag
    flavor: high-recall
    label: Hybrid High Recall
    description: Larger BM25+dense candidate pool before TEI rerank.
    requires_reingest: false
    params:
      retrieve_k: 40
      top_n: 8
      alpha: 0.5

  - alias: hybrid-rag-fast
    base: hybrid-rag
    flavor: fast
    label: Hybrid Fast
    description: Smaller hybrid candidate pool and no TEI rerank.
    requires_reingest: false
    params:
      retrieve_k: 10
      top_n: 5
      alpha: 0.5
      rerank: false

  - alias: contextual-rag-high-recall
    base: contextual-rag
    flavor: high-recall
    label: Contextual High Recall
    description: Contextual retrieval with a larger candidate pool before rerank.
    requires_reingest: false
    params:
      retrieve_k: 40
      top_n: 8
      alpha: 0.5

  - alias: graph-rag-fast
    base: graph-rag
    flavor: fast
    label: Graph Fast
    description: Lower LightRAG fanout for quicker graph answers.
    requires_reingest: false
    params: {}

  - alias: graph-rag-wide
    base: graph-rag
    flavor: wide
    label: Graph Wide
    description: Wider LightRAG graph and chunk fanout for relationship-heavy queries.
    requires_reingest: false
    params: {}

  - alias: graph-rag-rerank
    base: graph-rag
    flavor: rerank
    label: Graph Rerank
    description: Canonical LightRAG fanout with Atlas-adapted TEI reranking.
    requires_reingest: false
    params: {}

  - alias: agentic-rag-deeper
    base: agentic-rag
    flavor: deeper
    label: Agentic Deeper
    description: More ReAct steps and wider vector tool retrieval.
    requires_reingest: false
    params:
      max_steps: 8
      vector_top_k: 8
      graph_mode: hybrid

  - alias: n8n-adaptive-rag-default
    base: n8n-adaptive-rag
    flavor: default
    label: n8n Default
    description: Explicit alias for the current n8n adaptive workflow.
    requires_reingest: false
    params: {}

  - alias: lazy-graph-rag-fast
    base: lazy-graph-rag
    flavor: fast
    label: Lazy Graph Fast
    description: Small concept-expansion and context budgets for low query latency.
    requires_reingest: false
    params:
      relevance_budget: 8
      seed_k: 4
      max_context_chunks: 4
      max_concepts_per_chunk: 16

  - alias: lazy-graph-rag-balanced
    base: lazy-graph-rag
    flavor: balanced
    label: Lazy Graph Balanced
    description: Balanced concept-expansion, vector-seed, and context budgets.
    requires_reingest: false
    params:
      relevance_budget: 24
      seed_k: 8
      max_context_chunks: 8
      max_concepts_per_chunk: 24

  - alias: lazy-graph-rag-wide
    base: lazy-graph-rag
    flavor: wide
    label: Lazy Graph Wide
    description: Wider concept traversal and context for relationship-heavy questions.
    requires_reingest: false
    params:
      relevance_budget: 64
      seed_k: 16
      max_context_chunks: 12
      max_concepts_per_chunk: 32
