version: 1
root: ..
datasets_file: datasets.yaml

approaches:
  - model: vanilla-rag
    evidence: answer_with_contexts
  - model: hybrid-rag
    evidence: answer_with_contexts
  - model: contextual-rag
    evidence: answer_with_contexts
  - model: graph-rag
    evidence: answer_only
  - model: agentic-rag
    evidence: answer_with_contexts
  - model: n8n-adaptive-rag
    evidence: answer_with_contexts
  - model: lazy-graph-rag
    evidence: answer_with_contexts

metrics:
  ragas:
    - faithfulness
    - answer_relevancy
  judge_panel:
    enabled: true
    endpoint: atlas-litellm
    temperature: 0
    thinking: false
    # Supply deployment-specific aliases through JUDGE_MODELS. Keeping this
    # empty avoids assuming an Ollama catalog or any particular hardware.
    models: []

run:
  retries: 1
  timeout_s: 420
  evaluator_timeout_s: 420
  concurrency: 1
  seed: rag-showcase-v1
