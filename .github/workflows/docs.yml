name: Docs (MkDocs → Pages)

# Build the MkDocs Material site on every relevant change; publish to GitHub Pages
# only from the default branch. PRs get a build (validation) but no deploy.
on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "docs_hooks.py"
      - "pyproject.toml"
      - "uv.lock"
      - "corpus/**/*.md"
      - "n8n/**/*.md"
      - ".github/workflows/docs.yml"
  pull_request:
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "docs_hooks.py"
      - "pyproject.toml"
      - "uv.lock"
      - "corpus/**/*.md"
      - "n8n/**/*.md"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

# Workflow-level token: read-only. The Pages permissions live on the deploy job
# only — the build job also runs on pull_requests (and executes repo Python via
# mkdocs hooks), so it must not hold a pages/id-token-capable token.
permissions:
  contents: read

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        # infra/ is the Atlas submodule; the docs build does not need it.
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Build site
        run: |
          uv sync --only-group docs
          uv run --no-sync mkdocs build --clean --strict --site-dir site
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    # Publish only from the default branch, after a successful build.
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
