name: Docs (three surfaces)

# Validate the canonical docs, generate the MkDocs site and wiki surfaces, publish
# Pages from the default branch, and optionally sync the GitHub wiki when a wiki
# deploy key is configured.
on:
  push:
    branches: [main, develop]
    paths:
      - "docs/**"
      - "scripts/docs/**"
      - "Makefile"
      - "pyproject.toml"
      - "uv.lock"
      - "corpus/**/*.md"
      - "n8n/**/*.md"
      - ".github/workflows/docs.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "docs/**"
      - "scripts/docs/**"
      - "Makefile"
      - "pyproject.toml"
      - "uv.lock"
      - "corpus/**/*.md"
      - "n8n/**/*.md"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

# Workflow-level token: read-only. Publish jobs request their own scoped
# permissions, while PR validation only builds generated docs locally.
permissions:
  contents: read

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        # infra/ is the Atlas submodule; the docs build does not need it.
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install native diagram renderer deps
        run: sudo apt-get update && sudo apt-get install -y libcairo2
      - name: Check generated docs
        run: |
          uv sync --group docs --dev
          make docs-check
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    # Publish only from the default branch, after a successful build.
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

  wiki:
    # The wiki publish is intentionally independent from Pages. Repositories that
    # have not configured WIKI_DEPLOY_KEY still get full validation from `build`.
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    env:
      WIKI_DEPLOY_KEY: ${{ secrets.WIKI_DEPLOY_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        if: env.WIKI_DEPLOY_KEY != ''
        with:
          enable-cache: true
      - name: Install native diagram renderer deps
        if: env.WIKI_DEPLOY_KEY != ''
        run: sudo apt-get update && sudo apt-get install -y libcairo2
      - name: Configure wiki deploy key
        if: env.WIKI_DEPLOY_KEY != ''
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$WIKI_DEPLOY_KEY" > ~/.ssh/wiki_key
          chmod 600 ~/.ssh/wiki_key
          ssh-keyscan github.com >> ~/.ssh/known_hosts
          cat >> ~/.ssh/config <<'EOF'
          Host github.com
            IdentityFile ~/.ssh/wiki_key
            IdentitiesOnly yes
          EOF
      - name: Publish generated wiki
        if: env.WIKI_DEPLOY_KEY != ''
        run: |
          uv sync --group docs --dev
          uv run --no-sync python -m scripts.docs.push_wiki --push
      - name: Skip wiki publish
        if: env.WIKI_DEPLOY_KEY == ''
        run: echo "WIKI_DEPLOY_KEY is not configured; generated wiki validation was completed in the build job."
