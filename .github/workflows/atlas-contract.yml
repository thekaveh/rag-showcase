name: Atlas consumer contract

# Pin-bump drift gate. Whenever the vendored Atlas pin (`infra`) or the consumer
# manifest changes, statically materialize the consumer env and assert that the
# endpoint contract still exports every field this project's tooling reads. An
# Atlas bump that drops one fails here — a reviewable diff — instead of surfacing
# as a runtime 404. Runs WITHOUT starting services (no Docker needed).
on:
  push:
    branches: [main, develop]
    paths:
      - "infra"
      - ".gitmodules"
      - "atlas.consumer.yml"
      - "config/atlas.env.user"
      - ".github/workflows/atlas-contract.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "infra"
      - ".gitmodules"
      - "atlas.consumer.yml"
      - "config/atlas.env.user"
      - ".github/workflows/atlas-contract.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  endpoint-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Materialize the consumer env (env backfill — applies profile + sources)
        run: |
          cd infra
          [ -f .env ] || cp .env.example .env       # env backfill needs a base .env (start-all does the same)
          ./start.sh --consumer ../atlas.consumer.yml --project rag-showcase env backfill
      - name: Assert endpoint contract (drift gate — the fields our tooling reads)
        # Host-published container services expose a HOST endpoint on every host; the
        # LLM provider's endpoint shape is host-specific (ollama-localhost has a HOST
        # endpoint, a container source a CONTAINER one), so assert its universal
        # SOURCE field — which is what our eval tooling actually keys off.
        run: |
          cd infra && ./start.sh --consumer ../atlas.consumer.yml \
            --project rag-showcase endpoints assert --require \
            ATLAS_LITELLM_HOST_ENDPOINT,ATLAS_WEAVIATE_HOST_ENDPOINT,ATLAS_N8N_HOST_ENDPOINT,ATLAS_BACKEND_HOST_ENDPOINT,ATLAS_OLLAMA_SOURCE
      - name: Assert the infra pin did not drift (guards thekaveh/atlas#797)
        # The env-backfill / assert smoke above must not silently advance or stage
        # the pinned infra submodule (atlas#797). Fail with a reviewable diff if it
        # did — the CI complement to scripts/restore-infra-pin.sh. Remove once #797 ships.
        run: |
          if [ -n "$(git status --porcelain -- infra)" ]; then
            echo "::error::infra submodule drifted or was staged during the smoke run:"
            git status --porcelain -- infra
            git diff HEAD -- infra || true
            exit 1
          fi
          echo "infra pin unchanged at $(git rev-parse HEAD:infra)"
