name: Atlas consumer contract

# Pin-bump drift gate. Whenever the vendored Atlas pin (`infra`) or the consumer
# manifest changes, statically re-run Atlas's consumer preflight and assert that
# the endpoint contract still exports every field this project's tooling reads. An
# Atlas bump that drops one fails here — a reviewable diff — instead of surfacing
# as a runtime 404. Both checks run WITHOUT starting services (no Docker needed).
on:
  push:
    branches: [main, develop]
    paths:
      - "infra"
      - ".gitmodules"
      - "atlas.consumer.yml"
      - "config/atlas.env.user"
      - ".github/workflows/atlas-contract.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "infra"
      - ".gitmodules"
      - "atlas.consumer.yml"
      - "config/atlas.env.user"
      - ".github/workflows/atlas-contract.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  endpoint-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Consumer doctor (static preflight — manifest / sources / profile)
        run: |
          cd infra && ./start.sh --consumer ../atlas.consumer.yml \
            --project rag-showcase doctor --format json
      - name: Assert endpoint contract (drift gate — fields our tooling reads)
        run: |
          cd infra && ./start.sh --consumer ../atlas.consumer.yml \
            --project rag-showcase endpoints assert --require \
            ATLAS_LITELLM_HOST_ENDPOINT,ATLAS_WEAVIATE_HOST_ENDPOINT,ATLAS_N8N_HOST_ENDPOINT,ATLAS_OLLAMA_HOST_ENDPOINT,ATLAS_BACKEND_HOST_ENDPOINT
